      ignored: false
      product: ADMINEXPRESS-COG

  - id: adminexpress_cog_carto
    patterns:
      - ADMINEXPRESS-COG-CARTO-PE.*
      - ADMINEXPRESS-COG-CARTO.*
      - ADMINEXPRESS_COG_2018_CARTO
