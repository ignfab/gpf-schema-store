      product: unknown
      ignored: true
      ignoredReason: Fail to assign to an existing product

  # ============================================================================
  # DEFAULT: Fallback Rule
  # ============================================================================
  - id: default_ignore
    patterns: []
    metadata:
      ignored: true
      ignoredReason: No mathching rule, default ignore
