      ignored: false
      product: CADASTRE

  - id: cadastral_parcels_ignored
    patterns:
      - CADASTRALPARCELS.*
    metadata:
      ignored: true
      ignoredReason: Ignore other CADASTRALPARCELS datasets, using only PARCELLAIRE_EXPRESS for the MCP
      product: CADASTRE

  - id: bdparcellaire_deprecated
    patterns:
      - BDPARCELLAIRE-VECTEUR_WLD_BDD_WGS84G*
    metadata:
      ignored: true
      ignoredReason: Deprecated dataset, using CADASTRALPARCELS.PARCELLAIRE_EXPRESS instead
      product: BDPARCELLAIRE


  # ============================================================================
  # Outdated Datasets
  # ============================================================================
  - id: outdated_datasets
    patterns:
      - SANTE_BDD_SYMBO_FXX_WM_20171227
      - CGET_QP_BDD_WLD_WM_20160412
    metadata:
      ignored: true
      ignoredReason: Outdated dataset

  # ============================================================================
  # RPG Datasets
  # ============================================================================
  - id: rpg_datasets
    patterns:
      - RPG.*
    metadata:
