      ignored: true
      ignoredReason: Image index dataset

  - id: image_index_geographic_grids
    patterns:
      - GEOGRAPHICALGRIDSYSTEM.DFCI
      - GEOGRAPHICALGRIDSYSTEMS.MAPS.SCAN25.GRAPHE-MOSAIQUAGE
      - GEOGRAPHICALGRIDSYSTEMS.MAPS.SCAN50.1950.GRAPHE
