# Namespace filtering and product assignment rules
# Rules are evaluated in definition order (top to bottom)
# First matching rule wins
#
# Pattern matching:
# - No wildcards (*) = exact match
# - With wildcards (*) = glob pattern (e.g., "ORTHOIMAGERY.*" matches "ORTHOIMAGERY.anything")
#
# Supported patterns:
#   - "exact_namespace" → matches exactly this namespace
#   - "prefix.*" → matches anything starting with "prefix."
#   - "prefix_*" → matches anything starting with "prefix_"
#   - "*_suffix" → matches anything ending with "_suffix"
#   - "*middle*" → matches anything containing "middle"

rules:
  # ============================================================================
  # BDTOPO & BDCARTO
  # ============================================================================
  - id: bdtopo_v3
    patterns:
      - BDTOPO_V3
    metadata:
      ignored: false
      product: BDTOPO_V3

  - id: bdtopo_v3_diff
    patterns:
      - BDTOPO_V3_DIFF
    metadata:
      ignored: true
      ignoredReason: Historical data
      product: BDTOPO_V3_DIFF

  - id: bdcarto_v5
    patterns:
      - BDCARTO_V5
    metadata:
      ignored: false
      product: BDCARTO_V5

  # ============================================================================
  # Non-Spatial Datasets
  # ============================================================================
  - id: non_spatial_datasets
    patterns:
      - BDTOPO.EXTENSION.NOM_USUEL
    metadata:
      ignored: true
      ignoredReason: Non-spatial dataset

  # ============================================================================
  # Test & Development Data
  # ============================================================================
