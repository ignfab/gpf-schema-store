  # ============================================================================
  # Geocoding Services
  # ============================================================================
  - id: ban_datasets
    patterns:
      - BAN-PLUS
      - BAN.DATA.GOUV
    metadata:
      ignored: true
      ignoredReason: Using geocoding service in the MCP
      product: "BAN"

  # ============================================================================
  # Cadastre
  # ============================================================================

  - id: cadastral_parcels
    patterns:
      - CADASTRALPARCELS.PARCELLAIRE_EXPRESS
