  - id: no_use_case_forets_subnaturelles
    patterns:
      - ZONES-A-PROSPECTER-FORETS-SUBNATURELLES
    metadata:
      ignored: true
      ignoredReason: Waiting for MCP use case definition

  - id: no_use_case_dgcl
    patterns:
      - DGCL.2025
    metadata:
      ignored: true
      ignoredReason: Waiting for MCP use case definition

  - id: no_use_case_bdcarto_etat_major
    patterns:
      - BDCARTO_ETAT-MAJOR.*
    metadata:
      ignored: true
      ignoredReason: Waiting for MCP use case definition
      product: BDCARTO_ETAT-MAJOR

  # ============================================================================
  # Administrative Boundaries
  # ============================================================================
  - id: limites_administratives_express
    patterns:
      - LIMITES_ADMINISTRATIVES_EXPRESS.*
    metadata:
      ignored: true
      product: LIMITES_ADMINISTRATIVES_EXPRESS
      ignoredReason: Using ADMINEXPRESS-COG instead

  - id: adminexpress_cog
    patterns:
      - ADMINEXPRESS-COG.*
