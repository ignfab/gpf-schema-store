      ignoredReason: Waiting for MCP use case definition
      product: RPG

  # ============================================================================
  # Geoportail Urbanisme
  # ============================================================================
  - id: gpu_datasets
    patterns:
      - wfs_du
      - wfs_scot
      - wfs_sup
    metadata:
      ignored: false
      product: GPU

  # ============================================================================
  # Patrinat
  # ============================================================================
  - id: patrinat_datasets
    patterns:
      - patrinat_*
    metadata:
      product: PATRINAT
      ignored: true
      ignoredReason: Waiting for MCP use case definition

  # ============================================================================
  # LANDCOVER
  # ============================================================================
  - id: landcover_datasets
    patterns:
      - LANDCOVER.*
    metadata:
      ignored: true
      ignoredReason: Waiting for MCP use case definition
      product: LANDCOVER

  # ============================================================================
  # Ecoregions
  # ============================================================================
  - id: ecoregions_kept
    patterns:
      - ecoregions
    metadata:
      ignored: true
      ignoredReason: Waiting for MCP use case definition
      product: ecoregions

  - id: ecoregions_ignored
    patterns:
      - pays_ecoregions
    metadata:
      ignored: true
      ignoredReason: Duplicate dataset (ecoregions) 
      product: pays_ecoregions

  - id: carhab_datasets
    patterns:
      - Carhab_habitat
      - Carhab_habitat_Reunion
    metadata:
      ignored: true
      ignoredReason: Waiting for MCP use case definition
      product: CARHAB

  - id: er_datasets
    patterns:
      - espace_revendeurs
    metadata:
      ignored: true
      ignoredReason: Waiting for MCP use case definition
      product: ESPACE_REVENDEURS

  # ============================================================================
  # Other Namespaces with No Clear Product Assignment
  # ============================================================================
  - id: other_known_datasets
    patterns:
      - AREAMANAGEMENT.QP.VECTOR
      - AREAMANAGEMENT.ZFU.VECTOR
      - AREAMANAGEMENT.ZUS.VECTOR
      - BDFORETV1_BDD_FXX_LAMB93_20140403
