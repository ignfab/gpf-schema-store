      ignored: true
      ignoredReason: Image index dataset

  - id: image_index_pattern
    patterns:
      - ORTHOIMAGERY.*
    metadata:
      ignored: true
      ignoredReason: Image index dataset
      product: ORTHOIMAGERY

  # ============================================================================
  # AOC Viticoles
  # ============================================================================
  - id: aoc_viticoles
    patterns:
      - AOC-VITICOLES
    metadata:
